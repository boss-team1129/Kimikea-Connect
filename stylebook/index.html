<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f4ee">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kimikea Connect">
  <meta name="application-name" content="Kimikea Connect">
  <meta name="format-detection" content="telephone=no">
  <title>スタイル図鑑 | Kimikea Connect</title>
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <link rel="stylesheet" href="../shared-nav.css?v=20260712-2">
  <link rel="stylesheet" href="./style.css?v=20260713-debug-2">
</head>
<body>
  <main class="stylebook-app">
    <header class="topbar">
      <a class="back-link" href="../index.html" aria-label="Kimikea Connectホームへ戻る">戻る</a>
      <div class="topbar-title">
        <p>Kimikea Connect</p>
        <h1>スタイル図鑑</h1>
      </div>
      <button id="openAdminButton" class="icon-button" type="button" aria-label="本部管理">管理</button>
    </header>

    <section id="menuView" class="view-section stylebook-menu-view">
      <div class="menu-hero">
        <p>Kimikea Recipe Book</p>
        <h2>美容師専用レシピ図鑑</h2>
        <span>写真、使用色、本数をすばやく確認できます。</span>
      </div>
      <section class="menu-card-grid" aria-label="スタイル図鑑メニュー">
        <button class="menu-card primary" type="button" data-action="open-gallery">
          <span class="menu-card-icon">📖</span>
          <strong>図鑑を見る</strong>
          <small>写真一覧へ</small>
        </button>
        <button class="menu-card" type="button" data-action="show-post">
          <span class="menu-card-icon">＋</span>
          <strong>投稿する</strong>
          <small>新規投稿画面へ</small>
        </button>
        <button class="menu-card" type="button" data-action="show-drafts">
          <span class="menu-card-icon">□</span>
          <strong>下書き</strong>
          <small>自分の下書き一覧</small>
        </button>
        <button class="menu-card" type="button" data-action="show-saved">
          <span class="menu-card-icon">♡</span>
          <strong>保存したスタイル</strong>
          <small>お気に入り一覧</small>
        </button>
        <button class="menu-card" type="button" data-action="show-mine">
          <span class="menu-card-icon">◎</span>
          <strong>自分の投稿</strong>
          <small>公開中と下書きを管理</small>
        </button>
        <button id="menuAdminCard" class="menu-card admin-only" type="button" data-action="show-admin" hidden>
          <span class="menu-card-icon">⚙</span>
          <strong>管理</strong>
          <small>本部管理者のみ</small>
        </button>
      </section>
    </section>

    <section id="galleryView" class="view-section" hidden>
      <div class="compact-search">
        <label class="search-input">
          <span aria-hidden="true">⌕</span>
          <input id="keywordInput" type="search" placeholder="スタイルを検索">
        </label>
        <button id="filterToggle" class="mini-button" type="button">絞込</button>
        <select id="sortSelect" class="sort-select" aria-label="並び替え">
          <option value="recommended">おすすめ</option>
          <option value="popular">人気順</option>
          <option value="new">新着順</option>
          <option value="saved">保存数順</option>
          <option value="savedDate">保存した順</option>
        </select>
      </div>

      <section id="filterPanel" class="filter-panel" hidden>
        <div class="filter-row">
          <h2>エクステの色</h2>
          <div id="colorFilters" class="chip-grid"></div>
        </div>
        <div class="filter-row">
          <h2>施術スタイル</h2>
          <div id="styleFilters" class="chip-grid"></div>
        </div>
        <div class="filter-row two-col">
          <label>
            <span>店舗</span>
            <select id="shopFilter" multiple></select>
          </label>
          <label>
            <span>担当者</span>
            <select id="staffFilter" multiple></select>
          </label>
        </div>
        <label class="saved-only">
          <input id="savedOnlyToggle" type="checkbox">
          <span>保存済みのみ表示</span>
        </label>
      </section>

      <div class="result-meta">
        <div id="activeChips" class="active-chips"></div>
        <div class="result-actions">
          <span id="resultCount">0件</span>
          <button id="clearFiltersButton" class="text-button" type="button">すべて解除</button>
        </div>
      </div>

      <section id="galleryGrid" class="gallery-grid" aria-label="スタイル写真一覧"></section>
      <div id="infiniteSentinel" class="sentinel" aria-hidden="true"></div>
    </section>

    <section id="detailView" class="view-section detail-view" hidden></section>

    <section id="postView" class="view-section form-view" hidden>
      <div class="view-head">
        <button class="text-button" type="button" data-action="show-menu">メニューへ</button>
        <h2 id="postFormTitle">スタイル投稿</h2>
      </div>
      <form id="postForm" class="post-form">
        <input id="postId" type="hidden">
        <label class="image-uploader">
          <span>写真</span>
          <input id="imageInput" type="file" accept="image/*">
          <strong>写真を選択</strong>
          <small>スマホの写真フォルダから選べます。</small>
        </label>
        <div id="imagePreview" class="image-preview">写真プレビュー</div>

        <label class="field">
          <span>追加写真（任意・複数選択可）</span>
          <input id="additionalImageFiles" type="file" accept="image/*" multiple>
        </label>
        <input id="additionalImagesInput" type="hidden">
        <div class="field-grid">
          <section class="field color-picker-field">
            <span>エクステの色</span>
            <input id="colorSearchInput" type="search" placeholder="色番号・色名で検索 例：N-1 / ベージュ / ピンク">
            <div id="colorChoiceList" class="color-choice-list" aria-label="エクステカラー一覧"></div>
            <p id="selectedColorSummary" class="selected-color-summary">選択中の色はありません。</p>
            <select id="colorSelect" multiple hidden></select>
          </section>
          <label class="field">
            <span>使用本数</span>
            <input id="extensionCountInput" type="number" min="1" inputmode="numeric" required>
          </label>
        </div>
        <label class="field">
          <span>施術スタイル</span>
          <select id="styleTypeSelect" multiple required></select>
        </label>
        <label class="field">
          <span>スタイル名</span>
          <input id="titleInput" type="text" placeholder="例：ホワイトベージュイヤリング">
        </label>
        <label class="field">
          <span>コメント</span>
          <textarea id="descriptionInput" rows="4" placeholder="提案ポイント、仕上がりの印象など"></textarea>
        </label>
        <input id="statusInput" type="hidden" value="published">
        <div class="field-grid">
          <label class="field">
            <span>サロン名</span>
            <input id="salonNameInput" type="text" list="shopNameOptions" placeholder="エクステランド" required>
          </label>
          <label class="field">
            <span>担当者名</span>
            <input id="staffNameInput" type="text" list="staffNameOptions" placeholder="鈴木花子" required>
          </label>
        </div>
        <datalist id="shopNameOptions"></datalist>
        <datalist id="staffNameOptions"></datalist>
        <select id="shopSelect" hidden></select>
        <select id="staffSelect" hidden></select>

        <div class="form-actions">
          <button id="cancelEditButton" class="ghost-button" type="button" hidden>編集をやめる</button>
          <button class="ghost-button" type="button" data-action="show-menu">キャンセル</button>
          <button class="ghost-button" type="submit" data-submit-status="draft">下書き保存</button>
          <button class="primary-button" type="submit" data-submit-status="published">投稿する</button>
        </div>
        <p id="formMessage" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section id="savedView" class="view-section" hidden>
      <div class="view-head">
        <button class="text-button" type="button" data-action="show-menu">メニューへ</button>
        <h2>保存したスタイル</h2>
      </div>
      <section id="savedGrid" class="gallery-grid"></section>
    </section>

    <section id="draftsView" class="view-section" hidden>
      <div class="view-head">
        <button class="text-button" type="button" data-action="show-menu">メニューへ</button>
        <h2>下書き</h2>
      </div>
      <section id="draftsGrid" class="manage-list"></section>
    </section>

    <section id="mineView" class="view-section" hidden>
      <div class="view-head">
        <button class="text-button" type="button" data-action="show-menu">メニューへ</button>
        <h2>自分の投稿</h2>
      </div>
      <section id="mineGrid" class="manage-list"></section>
    </section>

    <section id="adminView" class="view-section admin-view" hidden>
      <div class="view-head">
        <button class="text-button" type="button" data-action="show-menu">メニューへ</button>
        <h2>本部管理ダッシュボード</h2>
      </div>
      <div id="adminDenied" class="admin-denied" hidden>本部管理者のみアクセスできます。</div>
      <div id="adminContent">
        <section id="adminStats" class="admin-stats"></section>
        <nav class="admin-tabs" aria-label="管理メニュー">
          <button class="active" type="button" data-admin-tab="posts">投稿管理</button>
          <button type="button" data-admin-tab="colors">商品マスタ</button>
          <button type="button" data-admin-tab="types">施術管理</button>
          <button type="button" data-admin-tab="shops">店舗管理</button>
          <button type="button" data-admin-tab="staff">担当者管理</button>
          <button type="button" data-admin-tab="users">ユーザー管理</button>
          <button type="button" data-admin-tab="deleted">削除済み</button>
        </nav>
        <section id="adminTable" class="admin-table-wrap"></section>
      </div>
    </section>

  </main>

  <script src="./script.js?v=20260713-debug-2"></script>
  <script src="../shared-nav.js?v=20260712-1"></script>
</body>
</html>
